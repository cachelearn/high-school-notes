<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 400" width="380" height="400" font-family="Georgia,serif" font-size="14">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#000"/>
    </marker>
  </defs>
  <!-- Circle -->
  <circle cx="190" cy="200" r="110" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Center dot -->
  <circle cx="190" cy="200" r="3" fill="#000"/>
  <!-- r label -->
  <line x1="190" y1="200" x2="300" y2="200" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="238" y="194" font-style="italic" fill="#888">r</text>

  <!-- BOTTOM POSITION -->
  <circle cx="190" cy="310" r="12" fill="white" stroke="#000" stroke-width="2"/>
  <text x="207" y="318" font-style="italic">v<tspan font-size="11" dy="2">B</tspan></text>
  <!-- T_B arrow upward -->
  <line x1="190" y1="298" x2="190" y2="240" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <text x="195" y="237" font-style="italic">T<tspan font-size="11" dy="2">B</tspan></text>
  <!-- mg arrow downward -->
  <line x1="190" y1="322" x2="190" y2="372" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <text x="195" y="388" font-style="italic">mg</text>

  <!-- TOP POSITION -->
  <circle cx="190" cy="90" r="12" fill="white" stroke="#000" stroke-width="2"/>
  <text x="207" y="88" font-style="italic">v<tspan font-size="11" dy="2">T</tspan></text>
  <!-- T_T arrow downward (toward center) -->
  <line x1="190" y1="102" x2="190" y2="148" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <text x="195" y="165" font-style="italic">T<tspan font-size="11" dy="2">T</tspan></text>
  <!-- mg arrow downward -->
  <line x1="190" y1="78" x2="190" y2="38" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <text x="195" y="30" font-style="italic">mg</text>
  <!-- Arrow direction note at top -->
  <text x="60" y="55" font-size="12" fill="#555">(both T and mg</text>
  <text x="60" y="70" font-size="12" fill="#555"> point downward</text>
  <text x="60" y="85" font-size="12" fill="#555"> at top)</text>

  <!-- Pivot point at center top -->
  <circle cx="190" cy="55" r="3" fill="#555"/>
  <line x1="190" y1="55" x2="190" y2="78" stroke="#555" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="155" y="50" font-size="12" fill="#555">pivot</text>
</svg>
