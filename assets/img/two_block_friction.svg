<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 280" width="460" height="280" font-family="Georgia,serif" font-size="15">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#000"/>
    </marker>
  </defs>
  <!-- Ground -->
  <line x1="20" y1="240" x2="440" y2="240" stroke="#000" stroke-width="2.5"/>
  <!-- Block M (bottom) -->
  <rect x="120" y="160" width="220" height="80" fill="white" stroke="#000" stroke-width="2"/>
  <text x="215" y="207" text-anchor="middle" font-style="italic" font-size="18">M</text>
  <!-- Block m (top) -->
  <rect x="155" y="90" width="130" height="70" fill="white" stroke="#000" stroke-width="2"/>
  <text x="220" y="132" text-anchor="middle" font-style="italic" font-size="18">m</text>
  <!-- Force F on top block -->
  <line x1="60" y1="125" x2="153" y2="125" stroke="#000" stroke-width="2" marker-end="url(#arr)"/>
  <text x="38" y="121" font-style="italic">F</text>
  <!-- Friction arrow at interface (pointing right on M, left on m) -->
  <line x1="220" y1="162" x2="290" y2="162" stroke="#000" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="295" y="158" font-size="13" fill="#333">f (on M)</text>
  <line x1="220" y1="158" x2="160" y2="158" stroke="#000" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
  <text x="80" y="154" font-size="13" fill="#333">f (on m)</text>
  <!-- Interface label -->
  <text x="220" y="185" text-anchor="middle" font-size="11" fill="#888">— interface (μ) —</text>
</svg>